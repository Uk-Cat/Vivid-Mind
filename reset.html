<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Mind – Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary:        #1c1d2e;
            --bg-secondary:      #252637;
            --bg-card:           #2d2f44;
            --bg-elevated:       #3a3c54;
            --accent-purple:     #4255ff;
            --accent-purple-hover: #5468ff;
            --accent-green:      #23b26d;
            --accent-red:        #ff4a4a;
            --text-primary:      #d9dde8;
            --text-secondary:    #9399b3;
            --text-muted:        #6b7194;
            --border:            rgba(255,255,255,0.07);
            --border-accent:     rgba(66,85,255,0.4);
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  20px;
            --shadow:     0 8px 32px rgba(0,0,0,0.4);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--text-primary);
            font-size: 1.25rem; font-weight: 700;
            margin-bottom: 4px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--accent-purple);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        h1 { font-size: 1.35rem; font-weight: 700; }
        p  { font-size: 0.88rem; color: var(--text-muted); margin-top: -10px; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label  { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; }

        input {
            padding: 11px 14px;
            background: var(--bg-elevated);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        input:focus { border-color: var(--border-accent); }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--accent-purple);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--accent-purple-hover); box-shadow: 0 4px 20px rgba(66,85,255,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            display: none;
        }
        .message.error {
            background: rgba(255,74,74,0.1);
            border: 1px solid rgba(255,74,74,0.3);
            color: #ff7b7b;
        }
        .message.success {
            background: rgba(35,178,109,0.1);
            border: 1px solid rgba(35,178,109,0.3);
            color: var(--accent-green);
        }
        .message.show { display: block; }

        .back-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .back-link a {
            color: var(--accent-purple);
            text-decoration: none;
        }
        .back-link a:hover { text-decoration: underline; }

        /* Loading state */
        .loading-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 20px 0;
        }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
        }
    </style>
</head>
<body>

<div class="card" id="main-card">

    <a class="logo" href="index.html">
        <div class="logo-icon">⚡</div>
        <span>Vivid Mind</span>
    </a>

    <!-- Loading while we detect the session type -->
    <div class="loading-state" id="loading">Verifying link…</div>

    <!-- Reset password form (shown for recovery links) -->
    <div id="reset-form" style="display:none; flex-direction:column; gap:18px;">
        <div>
            <h1>Set New Password</h1>
            <p style="margin-top:6px">Choose a new password for your account.</p>
        </div>
        <div class="field">
            <label>New Password</label>
            <input type="password" id="new-password" placeholder="Min. 6 characters">
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Repeat password">
        </div>
        <div class="message error" id="reset-error"></div>
        <button class="btn" id="reset-btn" onclick="handleReset()">Update Password</button>
        <div class="back-link"><a href="index.html">← Back to Vivid Mind</a></div>
    </div>

    <!-- Email confirmed (shown for signup confirmation links) -->
    <div id="confirmed-view" style="display:none; flex-direction:column; gap:16px; text-align:center;">
        <div style="font-size:2.5rem">✅</div>
        <h1>Email Confirmed!</h1>
        <p style="margin-top:0">Your account is verified. You can now sign in.</p>
        <a href="index.html" class="btn" style="text-decoration:none;text-align:center;display:block;">Go to Vivid Mind</a>
    </div>

    <!-- Error view -->
    <div id="error-view" style="display:none; flex-direction:column; gap:16px; text-align:center;">
        <div style="font-size:2.5rem">⚠️</div>
        <h1>Link Expired</h1>
        <p style="margin-top:0">This link is invalid or has expired. Please request a new one.</p>
        <a href="index.html" class="btn" style="text-decoration:none;text-align:center;display:block;">← Back to Sign In</a>
    </div>

</div>

<script>
    const SUPABASE_URL  = 'https://newsivpyvfnkthnxiyxk.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ld3NpdnB5dmZua3RobnhpeXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjY2MzEsImV4cCI6MjA4NjQwMjYzMX0.ytNvFv1AaT_9-K3l2_LdynlvYs9OieLdqpQyd3PMCEU';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function show(id) {
        document.getElementById('loading').style.display = 'none';
        ['reset-form', 'confirmed-view', 'error-view'].forEach(v => {
            const el = document.getElementById(v);
            el.style.display = v === id ? 'flex' : 'none';
        });
    }

    // Supabase puts the token in the URL hash on redirect
    // e.g. #access_token=...&type=recovery  or  #access_token=...&type=signup
    async function init() {
        const hash   = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const type   = params.get('type');

        if (!type) {
            // Try getSession in case Supabase already exchanged it
            const { data: { session } } = await sb.auth.getSession();
            if (session?.user) {
                show('confirmed-view');
            } else {
                show('error-view');
            }
            return;
        }

        if (type === 'recovery') {
            // Exchange the token so we can call updateUser
            const { error } = await sb.auth.exchangeCodeForSession(window.location.href)
                .catch(() => ({ error: null }));
            show('reset-form');

        } else if (type === 'signup') {
            // Email confirmed — session is set automatically
            show('confirmed-view');

        } else {
            show('error-view');
        }
    }

    // Also handle PKCE flow (Supabase v2 default)
    sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
            show('reset-form');
        } else if (event === 'SIGNED_IN') {
            const hash   = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            if (params.get('type') === 'signup') {
                show('confirmed-view');
            }
        }
    });

    async function handleReset() {
        const btn     = document.getElementById('reset-btn');
        const errEl   = document.getElementById('reset-error');
        const newPass = document.getElementById('new-password').value;
        const confPass = document.getElementById('confirm-password').value;

        errEl.classList.remove('show');

        if (newPass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
        if (newPass !== confPass) { showErr("Passwords don't match."); return; }

        btn.disabled    = true;
        btn.textContent = '⏳ Updating…';

        try {
            const { data, error } = await sb.auth.updateUser({ password: newPass });
            if (error) throw error;

            // Also update the Password column in Users table
            if (data.user?.email) {
                await sb.from('Users').update({ Password: newPass }).eq('Email', data.user.email);
            }

            // Show success then redirect
            btn.textContent = '✓ Password updated!';
            btn.style.background = 'var(--accent-green)';
            setTimeout(() => window.location.href = 'index.html', 1800);

        } catch(e) {
            showErr(e.message);
            btn.disabled    = false;
            btn.textContent = 'Update Password';
        }
    }

    function showErr(msg) {
        const el = document.getElementById('reset-error');
        el.textContent = msg;
        el.classList.add('show');
    }

    init();
</script>

</body>
</html>
